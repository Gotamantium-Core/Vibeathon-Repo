<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placement Prep Tracker ⚡</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    h1 {
      color: #38bdf8;
      margin-bottom: 10px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 20px;
      margin: 15px 0;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }
    input, select, button {
      padding: 12px;
      margin: 8px 4px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }
    input[type="number"] {
      width: 140px;
    }
    button {
      background: #38bdf8;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }
    button:hover {
      background: #0ea5e9;
      transform: translateY(-2px);
    }
    .btn-danger {
      background: #ef4444;
    }
    .btn-danger:hover {
      background: #dc2626;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      background: #334155;
      padding: 10px 15px;
      margin: 6px 0;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }
    .stat {
      background: #334155;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
    }
    .stat h2 {
      margin: 5px 0;
      color: #38bdf8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚡ Placement Prep Tracker</h1>
    <p style="color:#94a3b8;">Track your DSA + Study progress for placements</p>

    <!-- Add Progress -->
    <div class="card">
      <h3>Add Today's Progress</h3>
      <input type="number" id="problems" placeholder="Problems Solved" min="0" />
      <input type="number" id="hours" placeholder="Hours Studied" step="0.5" min="0" />
      
      <select id="topic">
        <option value="">Select Topic</option>
        <option>Arrays</option>
        <option>Strings</option>
        <option>Linked Lists</option>
        <option>Trees</option>
        <option>Graphs</option>
        <option>Dynamic Programming</option>
        <option>Greedy</option>
        <option>Binary Search</option>
        <option>Heap</option>
        <option>Backtracking</option>
      </select>
      
      <br>
      <button onclick="addProgress()">✅ Add Progress</button>
      <button onclick="resetData()" class="btn-danger">Reset All Data</button>
    </div>

    <!-- Stats -->
    <div class="card">
      <h3>Overview</h3>
      <div class="stats-grid">
        <div class="stat">
          <h2 id="totalProblems">0</h2>
          <p>Total Problems Solved</p>
        </div>
        <div class="stat">
          <h2 id="totalHours">0</h2>
          <p>Total Hours Studied</p>
        </div>
        <div class="stat">
          <h2 id="currentStreak">0</h2>
          <p>🔥 Current Streak</p>
        </div>
        <div class="stat">
          <h2 id="thisWeek">0</h2>
          <p>Problems This Week</p>
        </div>
      </div>
    </div>

    <!-- Topic Breakdown -->
    <div class="card">
      <h3>Topic Breakdown</h3>
      <ul id="topicsList"></ul>
    </div>

    <!-- Progress Chart -->
    <div class="card">
      <h3>Weekly Progress</h3>
      <canvas id="weeklyChart" height="100"></canvas>
    </div>
  </div>

<script>
let data = JSON.parse(localStorage.getItem("placementPrepData")) || {
  totalProblems: 0,
  totalHours: 0,
  streak: 0,
  lastDate: null,
  topics: {},
  history: []   // {date, problems, hours}
};

function getToday() {
  return new Date().toISOString().split('T')[0];
}

function addProgress() {
  const problems = parseFloat(document.getElementById("problems").value) || 0;
  const hours = parseFloat(document.getElementById("hours").value) || 0;
  const topic = document.getElementById("topic").value;

  if (problems === 0 && hours === 0) {
    alert("Please enter problems solved or hours studied!");
    return;
  }

  const today = getToday();

  // Streak Logic
  if (data.lastDate) {
    const last = new Date(data.lastDate);
    const curr = new Date(today);
    const diff = Math.floor((curr - last) / (1000 * 60 * 60 * 24));

    if (diff === 1) {
      data.streak++;
    } else if (diff > 1) {
      data.streak = 1;
    }
  } else {
    data.streak = 1;
  }

  data.lastDate = today;
  data.totalProblems += problems;
  data.totalHours += hours;

  // Add to topic count
  if (topic) {
    data.topics[topic] = (data.topics[topic] || 0) + problems;
  }

  // Save history
  data.history.push({
    date: today,
    problems: problems,
    hours: hours
  });

  localStorage.setItem("placementPrepData", JSON.stringify(data));
  
  // Clear inputs
  document.getElementById("problems").value = "";
  document.getElementById("hours").value = "";
  
  updateUI();
  alert("Progress added successfully! 🔥");
}

function updateUI() {
  // Basic Stats
  document.getElementById("totalProblems").textContent = data.totalProblems;
  document.getElementById("totalHours").textContent = data.totalHours.toFixed(1);
  document.getElementById("currentStreak").textContent = data.streak;

  // Topic List
  const topicsList = document.getElementById("topicsList");
  topicsList.innerHTML = "";
  
  if (Object.keys(data.topics).length === 0) {
    topicsList.innerHTML = "<li style='color:#64748b'>No topics added yet</li>";
  } else {
    Object.keys(data.topics).sort().forEach(topic => {
      const li = document.createElement("li");
      li.innerHTML = `<strong>${topic}</strong> <span>${data.topics[topic]} problems</span>`;
      topicsList.appendChild(li);
    });
  }

  // Draw Chart
  drawWeeklyChart();
}

function drawWeeklyChart() {
  const ctx = document.getElementById("weeklyChart");
  if (window.myChart) window.myChart.destroy();

  // Simple last 7 days data (you can improve this later)
  const labels = [];
  const problemsData = [];
  
  const today = new Date();
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const dateStr = d.toISOString().split('T')[0];
    labels.push(d.toLocaleDateString('en-US', {weekday: 'short'}));
    
    const dayData = data.history.filter(h => h.date === dateStr);
    const totalProb = dayData.reduce((sum, item) => sum + item.problems, 0);
    problemsData.push(totalProb);
  }

  window.myChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Problems Solved',
        data: problemsData,
        backgroundColor: '#38bdf8',
        borderColor: '#0ea5e9',
        borderWidth: 1,
        borderRadius: 6
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: { beginAtZero: true, grid: {color: '#334155'} },
        x: { grid: {color: '#334155'} }
      },
      plugins: {
        legend: { display: false }
      }
    }
  });
}

function resetData() {
  if (confirm("Are you sure you want to reset ALL data? This cannot be undone.")) {
    localStorage.removeItem("placementPrepData");
    location.reload();
  }
}

// Initialize
updateUI();
</script>
</body>
</html>
