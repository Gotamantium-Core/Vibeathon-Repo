<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placement Prep Tracker ⚡</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --primary: #38bdf8;
      --dark: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, var(--dark), #1e293b);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    .container { max-width: 920px; margin: 0 auto; }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }

    h1 {
      color: var(--primary);
      font-size: 29px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card);
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 15px;
    }

    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 26px;
      margin-bottom: 22px;
      box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.35);
    }

    input[type="number"], select {
      padding: 13px 16px;
      margin: 8px 6px 8px 0;
      border-radius: 10px;
      border: none;
      background: #334155;
      color: white;
      font-size: 16px;
    }

    input[type="number"] { width: 165px; }

    button {
      padding: 13px 20px;
      margin: 8px 6px;
      border-radius: 10px;
      border: none;
      background: var(--primary);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover {
      background: #0ea5e9;
      transform: translateY(-2px);
    }

    .btn-danger { background: #ef4444; }
    .btn-danger:hover { background: #dc2626; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 16px;
    }

    .stat {
      background: #334155;
      padding: 22px 16px;
      border-radius: 12px;
      text-align: center;
    }

    .stat h2 {
      margin: 6px 0 6px;
      color: var(--primary);
      font-size: 34px;
    }

    ul { list-style: none; padding: 0; }

    li {
      background: #334155;
      padding: 13px 18px;
      margin: 8px 0;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logout-btn {
      background: #ef4444;
      padding: 9px 18px;
      font-size: 14.5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>⚡ Placement Prep Tracker</h1>
        <p style="color: var(--muted); margin-top: 4px;">Track your DSA + Study progress for placements</p>
      </div>
      
      <div class="user-info">
        <span>Welcome, <strong id="usernameDisplay">User</strong></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- Add Progress -->
    <div class="card">
      <h3>Add Today's Progress</h3>
      <input type="number" id="problems" placeholder="Problems Solved" min="0" />
      <input type="number" id="hours" placeholder="Hours Studied" step="0.5" min="0" />
      
      <select id="topic">
        <option value="">Select Topic</option>
        <option>Arrays</option>
        <option>Strings</option>
        <option>Linked Lists</option>
        <option>Trees</option>
        <option>Graphs</option>
        <option>Dynamic Programming</option>
        <option>Greedy</option>
        <option>Binary Search</option>
        <option>Heap</option>
        <option>Backtracking</option>
        <option>Bit Manipulation</option>
      </select>
      
      <br><br>
      <button onclick="addProgress()">✅ Add Progress</button>
      <button onclick="resetData()" class="btn-danger">Reset My Data</button>
    </div>

    <!-- Stats -->
    <div class="card">
      <h3>Overview</h3>
      <div class="stats-grid">
        <div class="stat">
          <h2 id="totalProblems">0</h2>
          <p>Total Problems Solved</p>
        </div>
        <div class="stat">
          <h2 id="totalHours">0</h2>
          <p>Total Hours Studied</p>
        </div>
        <div class="stat">
          <h2 id="currentStreak">0</h2>
          <p>🔥 Current Streak</p>
        </div>
        <div class="stat">
          <h2 id="thisWeek">0</h2>
          <p>Problems This Week</p>
        </div>
      </div>
    </div>

    <!-- Topic Breakdown -->
    <div class="card">
      <h3>Topic Breakdown</h3>
      <ul id="topicsList"></ul>
    </div>

    <!-- Weekly Chart -->
    <div class="card">
      <h3>Weekly Progress</h3>
      <canvas id="weeklyChart" height="115"></canvas>
    </div>
  </div>

  <script>
    // Redirect to login if no user is logged in
    const currentUser = localStorage.getItem('currentUser');
    if (!currentUser) {
      window.location.href = 'login.html';
    }

    // Load user-specific data
    let dataKey = `placementData_${currentUser}`;
    let data = JSON.parse(localStorage.getItem(dataKey)) || {
      totalProblems: 0,
      totalHours: 0,
      streak: 0,
      lastDate: null,
      topics: {},
      history: []
    };

    function getToday() {
      return new Date().toISOString().split('T')[0];
    }

    function saveData() {
      localStorage.setItem(dataKey, JSON.stringify(data));
    }

    function updateUsername() {
      document.getElementById('usernameDisplay').textContent = currentUser;
    }

    function addProgress() {
      const problems = parseFloat(document.getElementById("problems").value) || 0;
      const hours = parseFloat(document.getElementById("hours").value) || 0;
      const topic = document.getElementById("topic").value;

      if (problems === 0 && hours === 0) {
        alert("Please enter problems solved or hours studied!");
        return;
      }

      const today = getToday();

      // Streak logic
      if (data.lastDate) {
        const last = new Date(data.lastDate);
        const curr = new Date(today);
        const diff = Math.floor((curr - last) / 86400000);

        if (diff === 1) data.streak++;
        else if (diff > 1) data.streak = 1;
      } else {
        data.streak = 1;
      }

      data.lastDate = today;
      data.totalProblems += problems;
      data.totalHours += hours;

      if (topic) {
        data.topics[topic] = (data.topics[topic] || 0) + problems;
      }

      data.history.push({ date: today, problems, hours });

      saveData();
      
      // Clear inputs
      document.getElementById("problems").value = "";
      document.getElementById("hours").value = "";

      updateUI();
      alert("Progress added successfully! 🔥");
    }

    function updateUI() {
      document.getElementById("totalProblems").textContent = data.totalProblems;
      document.getElementById("totalHours").textContent = data.totalHours.toFixed(1);
      document.getElementById("currentStreak").textContent = data.streak;

      const oneWeekAgo = new Date();
      oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
      const thisWeekCount = data.history
        .filter(h => new Date(h.date) >= oneWeekAgo)
        .reduce((sum, item) => sum + (item.problems || 0), 0);
      
      document.getElementById("thisWeek").textContent = thisWeekCount;

      // Topic list
      const topicsList = document.getElementById("topicsList");
      topicsList.innerHTML = "";

      if (Object.keys(data.topics).length === 0) {
        topicsList.innerHTML = `<li style="color:#64748b; justify-content:center">No topics added yet</li>`;
      } else {
        Object.keys(data.topics).sort().forEach(topic => {
          const li = document.createElement("li");
          li.innerHTML = `<strong>${topic}</strong> <span>${data.topics[topic]} problems</span>`;
          topicsList.appendChild(li);
        });
      }

      drawWeeklyChart();
    }

    function drawWeeklyChart() {
      const ctx = document.getElementById("weeklyChart");
      if (window.myChart) window.myChart.destroy();

      const labels = [];
      const problemsData = [];
      const today = new Date();

      for (let i = 6; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        const dateStr = d.toISOString().split('T')[0];
        labels.push(d.toLocaleDateString('en-US', { weekday: 'short' }));

        const dayData = data.history.filter(h => h.date === dateStr);
        const totalProb = dayData.reduce((sum, item) => sum + (item.problems || 0), 0);
        problemsData.push(totalProb);
      }

      window.myChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Problems Solved',
            data: problemsData,
            backgroundColor: '#38bdf8',
            borderColor: '#0ea5e9',
            borderWidth: 1,
            borderRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: { beginAtZero: true, grid: { color: '#334155' } },
            x: { grid: { color: '#334155' } }
          },
          plugins: { legend: { display: false } }
        }
      });
    }

    function resetData() {
      if (confirm(`Reset ALL data for ${currentUser}? This cannot be undone.`)) {
        localStorage.removeItem(dataKey);
        location.reload();
      }
    }

    function logout() {
      if (confirm("Logout from your account?")) {
        localStorage.removeItem('currentUser');
        window.location.href = 'login.html';
      }
    }

    // Initialize
    updateUsername();
    updateUI();
  </script>
</body>
</html>
